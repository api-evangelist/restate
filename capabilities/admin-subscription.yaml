naftiko: 1.0.0-alpha2
info:
  label: Admin API — subscription
  description: 'Admin API — subscription. 4 operations. Lead operation: List Subscriptions. Self-contained Naftiko capability
    covering one Restate business surface.'
  tags:
  - Restate
  - subscription
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RESTATE_API_KEY: RESTATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-subscription
    baseUri: ''
    description: Admin API — subscription business capability. Self-contained, no shared references.
    resources:
    - name: subscriptions
      path: /subscriptions
      operations:
      - name: listsubscriptions
        method: GET
        description: List Subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sink
          in: query
          type: string
          description: Filter by the exact specified sink.
        - name: source
          in: query
          type: string
          description: Filter by the exact specified source.
      - name: createsubscription
        method: POST
        description: Create Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: subscriptions-subscription
      path: /subscriptions/{subscription}
      operations:
      - name: getsubscription
        method: GET
        description: Get Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscription
          in: path
          type: string
          description: Subscription identifier
          required: true
      - name: deletesubscription
        method: DELETE
        description: Delete Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscription
          in: path
          type: string
          description: Subscription identifier
          required: true
  exposes:
  - type: rest
    namespace: admin-subscription-rest
    port: 8080
    description: REST adapter for Admin API — subscription. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/subscriptions
      name: subscriptions
      description: REST surface for subscriptions.
      operations:
      - method: GET
        name: listsubscriptions
        description: List Subscriptions
        call: admin-subscription.listsubscriptions
        with:
          sink: rest.sink
          source: rest.source
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsubscription
        description: Create Subscription
        call: admin-subscription.createsubscription
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions/{subscription}
      name: subscriptions-subscription
      description: REST surface for subscriptions-subscription.
      operations:
      - method: GET
        name: getsubscription
        description: Get Subscription
        call: admin-subscription.getsubscription
        with:
          subscription: rest.subscription
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesubscription
        description: Delete Subscription
        call: admin-subscription.deletesubscription
        with:
          subscription: rest.subscription
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-subscription-mcp
    port: 9090
    transport: http
    description: MCP adapter for Admin API — subscription. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-subscriptions
      description: List Subscriptions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-subscription.listsubscriptions
      with:
        sink: tools.sink
        source: tools.source
      outputParameters:
      - type: object
        mapping: $.
    - name: create-subscription
      description: Create Subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-subscription.createsubscription
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-subscription
      description: Get Subscription
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-subscription.getsubscription
      with:
        subscription: tools.subscription
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-subscription
      description: Delete Subscription
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-subscription.deletesubscription
      with:
        subscription: tools.subscription
      outputParameters:
      - type: object
        mapping: $.
