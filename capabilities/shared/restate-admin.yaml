naftiko: "1.0.0-alpha1"

info:
  label: "Restate Admin API"
  description: "The Restate Admin API for managing service deployments, services, invocations, Kafka subscriptions, and cluster health in the Restate durable execution platform."
  tags:
    - Deployments
    - Services
    - Invocations
    - Administration
    - Durable Execution
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RESTATE_ADMIN_URL: RESTATE_ADMIN_URL

capability:
  consumes:
    - type: http
      namespace: restate-admin
      baseUri: http://localhost:9070
      description: "Restate Admin API for cluster and service management"
      resources:
        - name: deployments
          path: /deployments
          description: "Service deployment registration and management"
          operations:
            - name: list-deployments
              method: GET
              description: "List all registered service deployments"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-deployment
              method: POST
              description: "Register a new service deployment with Restate"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  uri: "{{tools.uri}}"
                  force: "{{tools.force}}"
                  dry_run: "{{tools.dry_run}}"
            - name: get-deployment
              method: GET
              description: "Get details of a specific deployment"
              inputParameters:
                - name: deployment
                  in: path
                  type: string
                  required: true
                  description: "The deployment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-deployment
              method: DELETE
              description: "Delete a service deployment"
              inputParameters:
                - name: deployment
                  in: path
                  type: string
                  required: true
                  description: "The deployment identifier"
                - name: force
                  in: query
                  type: boolean
                  required: false
                  description: "Force deletion even if active invocations exist"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: services
          path: /services
          description: "Service metadata and configuration management"
          operations:
            - name: list-services
              method: GET
              description: "List all registered services and their handlers"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-service
              method: GET
              description: "Get metadata for a specific service"
              inputParameters:
                - name: service
                  in: path
                  type: string
                  required: true
                  description: "The service name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: modify-service
              method: PATCH
              description: "Modify service configuration (public access, retention policies)"
              inputParameters:
                - name: service
                  in: path
                  type: string
                  required: true
                  description: "The service name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  public: "{{tools.public}}"
            - name: list-service-handlers
              method: GET
              description: "List all handlers for a service"
              inputParameters:
                - name: service
                  in: path
                  type: string
                  required: true
                  description: "The service name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-service-handler
              method: GET
              description: "Get metadata for a specific service handler"
              inputParameters:
                - name: service
                  in: path
                  type: string
                  required: true
                  description: "The service name"
                - name: handler
                  in: path
                  type: string
                  required: true
                  description: "The handler name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: invocations
          path: /invocations
          description: "In-flight invocation management"
          operations:
            - name: cancel-invocation
              method: PATCH
              description: "Cancel an in-flight invocation"
              inputParameters:
                - name: invocation_id
                  in: path
                  type: string
                  required: true
                  description: "The invocation identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: kill-invocation
              method: PATCH
              description: "Forcefully kill an invocation"
              inputParameters:
                - name: invocation_id
                  in: path
                  type: string
                  required: true
                  description: "The invocation identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: purge-invocation
              method: PATCH
              description: "Purge a completed invocation and its state"
              inputParameters:
                - name: invocation_id
                  in: path
                  type: string
                  required: true
                  description: "The invocation identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: subscriptions
          path: /subscriptions
          description: "Kafka subscription management for event-driven invocations"
          operations:
            - name: list-subscriptions
              method: GET
              description: "List all Kafka subscriptions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-subscription
              method: POST
              description: "Create a new Kafka subscription to trigger service handlers"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  source: "{{tools.source}}"
                  sink: "{{tools.sink}}"
            - name: get-subscription
              method: GET
              description: "Get details of a specific Kafka subscription"
              inputParameters:
                - name: subscription
                  in: path
                  type: string
                  required: true
                  description: "The subscription identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-subscription
              method: DELETE
              description: "Delete a Kafka subscription"
              inputParameters:
                - name: subscription
                  in: path
                  type: string
                  required: true
                  description: "The subscription identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: cluster-health
          path: /cluster-health
          description: "Cluster health and version information"
          operations:
            - name: cluster-health
              method: GET
              description: "Get the health status of the Restate cluster"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-version
              method: GET
              description: "Get Restate Admin API version information"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: restate-admin-rest
      resources:
        - path: /v1/deployments
          name: deployments
          description: "Service deployments"
          operations:
            - method: GET
              name: list-deployments
              description: "List all deployments"
              call: "restate-admin.list-deployments"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-deployment
              description: "Register a deployment"
              call: "restate-admin.create-deployment"
              with:
                uri: "rest.body.uri"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/deployments/{deployment}
          name: deployment
          description: "Individual deployment management"
          operations:
            - method: GET
              name: get-deployment
              description: "Get deployment details"
              call: "restate-admin.get-deployment"
              with:
                deployment: "rest.deployment"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-deployment
              description: "Delete a deployment"
              call: "restate-admin.delete-deployment"
              with:
                deployment: "rest.deployment"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/services
          name: services
          description: "Service registry"
          operations:
            - method: GET
              name: list-services
              description: "List all services"
              call: "restate-admin.list-services"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/invocations/{invocation_id}/cancel
          name: invocation-cancel
          description: "Cancel invocations"
          operations:
            - method: PATCH
              name: cancel-invocation
              description: "Cancel an invocation"
              call: "restate-admin.cancel-invocation"
              with:
                invocation_id: "rest.invocation_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/subscriptions
          name: subscriptions
          description: "Kafka subscriptions"
          operations:
            - method: GET
              name: list-subscriptions
              description: "List Kafka subscriptions"
              call: "restate-admin.list-subscriptions"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-subscription
              description: "Create Kafka subscription"
              call: "restate-admin.create-subscription"
              with:
                source: "rest.body.source"
                sink: "rest.body.sink"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/cluster-health
          name: cluster-health
          description: "Cluster health"
          operations:
            - method: GET
              name: cluster-health
              description: "Get cluster health"
              call: "restate-admin.cluster-health"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: restate-admin-mcp
      transport: http
      tools:
        - name: list-deployments
          description: "List all registered Restate service deployments"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "restate-admin.list-deployments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-deployment
          description: "Register a new service deployment with Restate"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "restate-admin.create-deployment"
          with:
            uri: "tools.uri"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-deployment
          description: "Get details of a specific Restate service deployment"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "restate-admin.get-deployment"
          with:
            deployment: "tools.deployment"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-deployment
          description: "Delete a Restate service deployment"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "restate-admin.delete-deployment"
          with:
            deployment: "tools.deployment"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-services
          description: "List all registered Restate services"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "restate-admin.list-services"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-service
          description: "Get metadata for a specific Restate service"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "restate-admin.get-service"
          with:
            service: "tools.service"
          outputParameters:
            - type: object
              mapping: "$."
        - name: modify-service
          description: "Modify Restate service configuration"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "restate-admin.modify-service"
          with:
            service: "tools.service"
            public: "tools.public"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-service-handlers
          description: "List all handlers for a Restate service"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "restate-admin.list-service-handlers"
          with:
            service: "tools.service"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cancel-invocation
          description: "Cancel an in-flight Restate invocation"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "restate-admin.cancel-invocation"
          with:
            invocation_id: "tools.invocation_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: purge-invocation
          description: "Purge a completed Restate invocation and its associated state"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "restate-admin.purge-invocation"
          with:
            invocation_id: "tools.invocation_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-subscriptions
          description: "List all Kafka subscriptions in Restate"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "restate-admin.list-subscriptions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-subscription
          description: "Create a Kafka subscription to trigger Restate service handlers on events"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "restate-admin.create-subscription"
          with:
            source: "tools.source"
            sink: "tools.sink"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cluster-health
          description: "Get the health status of the Restate cluster"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "restate-admin.cluster-health"
          outputParameters:
            - type: object
              mapping: "$."
