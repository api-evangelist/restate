aid: restate
name: Restate
description: >-
  Restate is a low-latency durable execution engine for building resilient applications that tolerate all infrastructure
  faults. It provides durable execution for workflows, event-driven handlers, and stateful orchestration of
  microservices with exactly-once semantics, automatic retries, and built-in state management.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
