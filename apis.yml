apis:
  - aid: restate:restate-admin
    name: Restate Admin API
    description: >-
      The Restate Admin API provides endpoints for managing service deployments, inspecting service metadata, managing
      in-flight invocations, and monitoring the health of the Restate server. It enables operators to register service
      deployments, purge completed invocations, and configure services programmatically.
    humanURL: https://restate.dev/
